{% extends 'base_home.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-lg p-4" style="width:430px; border-radius:15px;">
        <h3 class="text-center mb-3">Reset Password</h3>
        <p class="text-muted text-center">Enter your account email and we will send you a password reset link.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/email.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="email" name="email" class="form-control" id="id_email" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>

        <p class="text-center mt-3 mb-0">
            <a href="{% url 'login' %}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
