{% extends 'base_home.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-lg p-4" style="width:430px; border-radius:15px;">
        <h3 class="text-center mb-3">Set New Password</h3>

        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_new_password1" class="form-label">New Password</label>
                    <input type="password" name="new_password1" class="form-control" id="id_new_password1" required>
                </div>
                <div class="mb-3">
                    <label for="id_new_password2" class="form-label">Confirm New Password</label>
                    <input type="password" name="new_password2" class="form-control" id="id_new_password2" required>
                </div>
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Please correct the password errors and try again.
                    </div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">Update Password</button>
            </form>
        {% else %}
            <p class="text-muted text-center mb-3">This reset link is invalid or has already been used.</p>
            <a href="{% url 'password_reset' %}" class="btn btn-outline-primary w-100">Request New Link</a>
        {% endif %}
    </div>
</div>
{% endblock %}
