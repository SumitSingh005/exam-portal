{% extends 'base_home.html' %}
{% load static %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card shadow-lg p-4" style="width:400px; border-radius:15px;">
        <div class="auth-card-brand">
            <img src="{% static 'images/exam-logo.svg' %}" class="brand-logo brand-logo-lg" alt="{{ site_name }} logo">
            <h3>Student Signup</h3>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/user.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="text" name="username" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/id-card.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="text" name="student_id" class="form-control" placeholder="Example: STU2026001" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/email.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="email" name="email" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/lock.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="password" name="password1" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <img src="{% static 'images/icons/lock.svg' %}" class="input-icon" alt="">
                    </span>
                    <input type="password" name="password2" class="form-control" required>
                </div>
            </div>

            <button class="btn btn-primary w-100">Register</button>
        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

{% endblock %}
