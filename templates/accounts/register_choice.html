{% extends 'base_home.html' %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">
        <img src="{% static 'images/exam-logo.svg' %}" class="brand-logo auth-page-logo" alt="{{ site_name }} logo">
        <h1 class="fw-bold">Create Your Account</h1>
        <p class="text-muted">Choose your role to continue</p>
    </div>

    <div class="row justify-content-center">

        <!-- Student Card -->
        <div class="col-md-4 mb-4">
            <div class="role-card text-center p-4">

                <div class="icon mb-3">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>

                <h4>Student</h4>
                <p class="text-muted">Take exams and track your performance</p>

                <a href="{% url 'student_signup' %}" class="btn btn-primary w-100 mt-3">
                    Register as Student
                </a>

            </div>
        </div>

        <!-- Teacher Card -->
        <div class="col-md-4 mb-4">
            <div class="role-card text-center p-4">

                <div class="icon mb-3">
                    <i class="bi bi-person-workspace"></i>
                </div>

                <h4>Teacher</h4>
                <p class="text-muted">Create exams and manage students</p>

                <a href="{% url 'teacher_signup' %}" class="btn btn-success w-100 mt-3">
                    Register as Teacher
                </a>

            </div>
        </div>

    </div>

</div>

{% endblock %}
